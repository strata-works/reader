name: encarta_reader
description: Faithful-in-spirit reader for the recovered Encarta 2009 corpus.
publish_to: none
version: 0.1.0

environment:
  sdk: '>=3.12.0-0 <4.0.0'
  flutter: '>=3.42.0-0'

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  encarta_data:
    path: ../../packages/encarta_data
  encarta_render:
    path: ../../packages/encarta_render
  encarta_assets:
    path: ../../packages/encarta_assets
  auto_route: ^9.2.2
  media_kit: ^1.1.11

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
