name: encarta_data
description: >-
  Read-only, typed access to the recovered Encarta 2009 corpus
  (drift over the sqlite3 FFI). Pure Dart — no Flutter.
publish_to: none
version: 0.1.0
resolution: workspace

environment:
  sdk: '>=3.12.0-0 <4.0.0'

dependencies:
  drift: ^2.20.0
  meta: ^1.9.0
  sqlite3: ^2.4.0

dev_dependencies:
  archive: ^3.6.0
  build_runner: ^2.4.0
  drift_dev: ^2.20.0
  lints: ^5.0.0
  test: ^1.25.0
